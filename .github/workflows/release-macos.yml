name: release-macos

# Builds the macOS installer (universal .dmg — arm64 + x86_64) on a GitHub-hosted
# macos runner and uploads it to the GitHub Release for the tag. Runs automatically
# on a version tag, and can be dispatched manually against an existing tag to
# backfill a release that was cut before this workflow existed.
#
# The bundle is code-signed with a "Developer ID Application" certificate and
# notarized with an App Store Connect API key, so it opens on macOS without a
# Gatekeeper warning. Both are injected from repo secrets (never in the repo):
#   APPLE_CERTIFICATE          base64 of the Developer ID .p12
#   APPLE_CERTIFICATE_PASSWORD .p12 export password
#   APPLE_SIGNING_IDENTITY     "Developer ID Application: … (TEAMID)"
#   APPLE_TEAM_ID              Apple Developer team id
#   APPLE_API_ISSUER           App Store Connect API issuer id
#   APPLE_API_KEY              App Store Connect API key id
#   APPLE_API_KEY_P8           base64 of the AuthKey_*.p8 (decoded to a file below)
#
# Uses only first-party actions/* + the preinstalled `gh` CLI, so it runs even
# if the org restricts third-party GitHub Actions.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to upload the macOS installer to (e.g. v0.1.14)'
        required: true
      ref:
        description: 'Git ref to build from (branch/tag/sha). Defaults to the tag. Use a branch to backfill a fix not yet in the tag.'
        required: false

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # Rust (stable, via rustup) is preinstalled on the macos runner. Add both
      # arches so we can ship a single universal binary that runs on Apple
      # Silicon and Intel Macs.
      - name: Add Rust targets (universal)
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # Decode the App Store Connect API key (.p8) to a file for notarization.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/authkey.p8"

      # `tauri build` runs next-build first (beforeBuildCommand), then code-signs
      # with the Developer ID cert and notarizes via the API key — all triggered
      # by the APPLE_* env vars below. No manual keychain/codesign steps needed.
      - name: Build signed + notarized bundle (universal .dmg)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
        run: npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Collect installer
        shell: bash
        run: |
          mkdir -p dist-release
          find src-tauri/target -name '*.dmg' -exec cp {} dist-release/ \;
          ls -la dist-release

      - name: Upload to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist-release/* --clobber
