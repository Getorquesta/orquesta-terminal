name: build

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tauri-linux:
    name: Build (Tauri · Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # System libraries required by Tauri v2 / WebKitGTK on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            patchelf \
            file wget curl

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Static export of the Next.js frontend into src-tauri/webview-dist.
      - name: Build frontend (static export)
        run: npm run next-build

      # Type-check + compile the Rust backend (fails the job on any error).
      - name: Check Rust backend
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      # Full bundle — proves the whole migration builds end to end.
      - name: Build Tauri bundle
        run: npm run build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orquesta-terminal-linux
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 7
