name: release

# Publishes the Linux installer to the GitHub Releases page.
# Uses ONLY first-party actions/* + the preinstalled `gh` CLI, so it runs
# even if the org restricts third-party GitHub Actions.
# Windows/macOS users use the web version (cloud mode) for now.
#
# Trigger by pushing a version tag, e.g.:  git tag v0.1.9 && git push origin v0.1.9
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            patchelf \
            file wget curl

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # Build the full Tauri bundle (.AppImage + .deb). `npm run build`
      # runs `tauri build`, which runs next-build via beforeBuildCommand.
      - name: Build Tauri bundle
        run: npm run build

      - name: Collect installers
        run: |
          mkdir -p dist-release
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist-release/ \;
          ls -la dist-release

      # Create/replace a draft GitHub Release for this tag and upload the
      # Linux installers. `gh` is preinstalled on the runner.
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "$TAG" \
            --draft \
            --title "Orquesta Terminal $TAG" \
            --notes "Linux installers below (.AppImage / .deb). Windows & macOS: use the web version for now." \
            dist-release/*
