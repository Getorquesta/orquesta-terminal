name: release

# Publishes the Linux installer to the GitHub Releases page.
# Windows/macOS users use the web version (cloud mode) for now —
# native installers there need paid code-signing, deferred.
#
# Trigger by pushing a version tag, e.g.:  git tag v0.1.9 && git push origin v0.1.9
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            patchelf \
            file wget curl

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      # tauri-action runs `tauri build` (which runs next-build via
      # beforeBuildCommand), then creates/updates the GitHub Release
      # for this tag and uploads the Linux installers (.AppImage + .deb).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Orquesta Terminal ${{ github.ref_name }}'
          releaseBody: 'Linux installers below (.AppImage / .deb). Windows & macOS: use the web version for now.'
          releaseDraft: true
          prerelease: false
